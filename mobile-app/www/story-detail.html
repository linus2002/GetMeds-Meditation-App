<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Story - Reading Mode</title>
    <link rel="stylesheet" href="style.css?v=28">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .story-text-container {
            font-size: 20px;
            line-height: 1.8;
            color: var(--text-muted);
            padding: 40px 24px 150px;
        }

        .word-active {
            color: var(--primary-purple);
            font-weight: 600;
            transition: color 0.2s;
        }

        .play-float-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            z-index: 100;
        }

        .voice-fab {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary-purple);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: none;
            box-shadow: 0 5px 15px rgba(29,159,218,0.3);
            cursor: pointer;
        }
    </style>
</head>

<body data-page="subpage">
    <div class="device-frame">
        <div class="device-bezel">
            <div class="dynamic-island"></div>
            <div class="device-screen" style="background-color: #FFFFFF;">
                
                <div class="main-top-navbar border">
                    <div class="top-nav-left" style="display: flex; align-items: center; gap: 12px;">
                        <i class="fas fa-chevron-left" onclick="history.back()" style="font-size: 18px; color: var(--text-main); cursor: pointer;"></i>
                        <h2 style="font-size: 18px; font-weight: 700; color: var(--text-main); margin: 0;">Reading Mode</h2>
                    </div>
                </div>

                <div class="app-container-scroller" id="scrollContainer" style="padding: 0;">
                    <!-- Hero Section -->
                    <div style="padding: 40px 24px 0;">
                        <span style="font-size: 12px; font-weight: 700; color: var(--primary-purple); text-transform: uppercase; letter-spacing: 2px;">Sleep Story</span>
                        <h1 id="mainTitle" style="font-family: 'Playfair Display', serif; font-size: 36px; margin: 12px 0 24px; color: var(--text-main);">The Ocean's Whisper</h1>
                        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 40px;">
                            <div style="width: 40px; height: 40px; border-radius: 12px; background: #EEF2FF; display: flex; align-items: center; justify-content: center; color: var(--primary-purple);">
                                <i class="fas fa-user"></i>
                            </div>
                            <div>
                                <p style="font-size: 14px; font-weight: 700; color: var(--text-main); margin: 0;">Narrated by Elias</p>
                                <p style="font-size: 12px; color: var(--text-muted); margin: 0;">Deep • Calm • 45 min</p>
                            </div>
                        </div>
                    </div>

                    <!-- Story Text -->
                    <div class="story-text-container" id="storyText">
                        <!-- Words will be injected here as spans -->
                    </div>
                </div>

                <!-- Control Bar -->
                <div class="play-float-bar">
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <button class="voice-fab" id="playBtn" onclick="toggleNarrator()">
                            <i class="fas fa-play"></i>
                        </button>
                        <div>
                            <p style="font-size: 14px; font-weight: 700; color: var(--text-main); margin: 0;">Listening Now</p>
                            <p style="font-size: 11px; color: var(--text-muted); margin: 0;" id="progressText">0:00 / 45:00</p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 16px;">
                        <i class="fas fa-bookmark" style="color: var(--text-muted); font-size: 18px;"></i>
                        <i class="fas fa-cog" style="color: var(--text-muted); font-size: 18px;"></i>
                    </div>
                </div>

                <div class="home-indicator"></div>
            </div>
        </div>
    </div>

    <script>
        const story = "The sun slowly dipped below the horizon, painting the sky in shades of deep indigo and shimmering violet. As the world grew quiet, the gentle song of the ocean began to rise. Close your eyes and imagine the soft rhythmic pull of the tide against the shore. Each wave is a whisper, a reminder that the world is breathing with you. Deep into the Atlantic, where the water is a clear, dark sapphire, the currents move with a grace that only time can teach. Imagine yourself floating, weightless and free, as the cool water cradles your body and the salt air cleanses your spirit. You are here, you are safe, and the night is yours to rest.";
        
        const textContainer = document.getElementById('storyText');
        const words = story.split(' ');
        
        words.forEach((word, index) => {
            const span = document.createElement('span');
            span.textContent = word + ' ';
            span.id = `word-${index}`;
            textContainer.appendChild(span);
        });

        let isPlaying = false;
        let currentWordIndex = 0;
        let timer = null;

        function toggleNarrator() {
            const btn = document.getElementById('playBtn');
            const icon = btn.querySelector('i');
            
            if (isPlaying) {
                isPlaying = false;
                icon.classList.replace('fa-pause', 'fa-play');
                clearInterval(timer);
            } else {
                isPlaying = true;
                icon.classList.replace('fa-play', 'fa-pause');
                startReading();
            }
        }

        function startReading() {
            timer = setInterval(() => {
                if (currentWordIndex >= words.length) {
                    clearInterval(timer);
                    isPlaying = false;
                    document.getElementById('playBtn').querySelector('i').classList.replace('fa-pause', 'fa-play');
                    return;
                }

                // Remove highlight from previous word
                if (currentWordIndex > 0) {
                    document.getElementById(`word-${currentWordIndex - 1}`).classList.remove('word-active');
                }

                // Add highlight to current word
                const currentEl = document.getElementById(`word-${currentWordIndex}`);
                currentEl.classList.add('word-active');

                // Auto Scroll
                if (currentWordIndex % 10 === 0) {
                    currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }

                currentWordIndex++;

                // Update Progress
                const seconds = currentWordIndex; 
                document.getElementById('progressText').textContent = `0:${seconds < 10 ? '0'+seconds : seconds} / 45:00`;
            }, 300); // 300ms per word = approx 200 wpm
        }
    </script>
</body>

</html>
