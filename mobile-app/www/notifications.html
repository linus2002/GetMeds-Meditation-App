<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getmeds Meditation App - Notifications</title>
    <meta name="description" content="View your notifications.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .notif-section {
            margin-bottom: 24px;
        }

        .notif-date-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding: 0 24px;
        }

        .notif-card {
            display: flex;
            padding: 16px 24px;
            gap: 16px;
            position: relative;
            background: transparent;
            border-bottom: 1px solid var(--border-color);
        }

        .notif-card:last-child {
            border-bottom: none;
        }

        .notif-icon-wrap {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }

        .notif-content {
            flex: 1;
            padding-right: 50px; /* Space for time/badge */
        }

        .notif-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin: 0 0 4px 0;
            line-height: 1.3;
        }

        .notif-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.4;
        }

        .notif-right {
            position: absolute;
            right: 24px;
            top: 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .notif-time {
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .notif-badge {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #8B5CF6; /* Purple badge */
            color: white;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notif-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .notif-btn {
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .notif-btn.primary {
            background: #8B5CF6;
            color: white;
        }

        .notif-btn.secondary {
            background: transparent;
            color: #8B5CF6;
            border-color: #D8B4FE;
        }
        
        .dark-theme .notif-btn.secondary {
            border-color: #6D28D9;
        }
    </style>
</head>

<body data-page="subpage">
    <div class="device-frame">
        <div class="device-bezel">
            <div class="dynamic-island"></div>
            <div class="device-screen" style="background-color: var(--bg-light);">
                <!-- Status Bar -->
                <div class="status-bar" style="--status-color: #1F2937;">
                    <div class="time">9:41</div>
                    <div class="indicators">
                        <i class="fas fa-signal"></i>
                        <i class="fas fa-wifi"></i>
                        <i class="fas fa-battery-full"></i>
                    </div>
                </div>

                <!-- Main Top Navbar -->
                <div class="main-top-navbar border">
                    <div class="top-nav-left" style="flex: 1;">
                        <i class="fas fa-arrow-left" onclick="window.history.back()" style="font-size: 20px; color: var(--text-main); cursor: pointer;"></i>
                    </div>
                    <div class="top-nav-center" style="flex: 2; text-align: center;">
                        <h2 style="font-size: 16px; font-weight: 600; color: var(--text-main); margin: 0;">Notifications</h2>
                    </div>
                    <div class="top-nav-right" style="flex: 1; text-align: right;">
                        <i class="fas fa-ellipsis-v" style="font-size: 18px; color: var(--text-main); cursor: pointer;"></i>
                    </div>
                </div>

                <div class="app-container-scroller" id="notifications-container" style="padding-top: 20px; padding-bottom: 40px;">
                    <!-- Notifications will be injected here dynamically -->
                </div>

                <!-- Home Indicator -->
                <div class="home-indicator"></div>

            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
    <script>
        // Define meditation-related notifications
        const notificationsData = [
            {
                section: "Today",
                items: [
                    {
                        icon: "fa-spa",
                        iconColor: "#8B5CF6",
                        iconBg: "rgba(139, 92, 246, 0.1)",
                        title: "Upcoming Session",
                        subtitle: "Your Morning Breathing session starts in 15 mins.",
                        time: "07:45 AM",
                        badge: 1,
                        hasActions: false
                    },
                    {
                        icon: "fa-book-open",
                        iconColor: "#22C55E",
                        iconBg: "rgba(34, 197, 94, 0.1)",
                        title: "New Content Added",
                        subtitle: "Check out the new Sleep Story: Whispering Pines.",
                        time: "09:00 AM",
                        hasActions: false
                    }
                ]
            },
            {
                section: "Yesterday",
                items: [
                    {
                        icon: "fa-fire",
                        iconColor: "#F97316",
                        iconBg: "rgba(249, 115, 22, 0.1)",
                        title: "3-Day Streak! 🔥",
                        subtitle: "You've meditated for 3 consecutive days. Keep it up!",
                        time: "08:30 PM",
                        hasActions: false
                    },
                    {
                        icon: "fa-check-circle",
                        iconColor: "#22C55E",
                        iconBg: "rgba(34, 197, 94, 0.1)",
                        title: "Session Completed",
                        subtitle: "You completed your Evening Relaxation session.",
                        time: "08:00 PM",
                        hasActions: false
                    }
                ]
            },
            {
                section: "27 November 2023",
                items: [
                    {
                        icon: "fa-heart-pulse",
                        iconColor: "#8B5CF6",
                        iconBg: "rgba(139, 92, 246, 0.1)",
                        title: "Check-in Reminder",
                        subtitle: "It's time for your daily mental wellness check-in.",
                        time: "10:00 AM",
                        hasActions: false
                    }
                ]
            },
            {
                section: "26 November 2023",
                items: [
                    {
                        icon: "fa-leaf",
                        iconColor: "#10B981",
                        iconBg: "rgba(16, 185, 129, 0.1)",
                        title: "Welcome Onboard Maria! 🎉",
                        subtitle: "Start your journey to mindfulness with us.",
                        time: "01:30 PM",
                        hasActions: true
                    }
                ]
            }
        ];

        function renderNotifications() {
            const container = document.getElementById('notifications-container');
            let html = '';

            notificationsData.forEach(section => {
                html += `
                    <div class="notif-section">
                        <div class="notif-date-label">${section.section}</div>
                `;

                section.items.forEach((item, index) => {
                    const isLast = index === section.items.length - 1;
                    const borderStyle = isLast ? 'style="border-bottom: none;"' : '';
                    const badgeHtml = item.badge ? `<div class="notif-badge">${item.badge}</div>` : '';
                    
                    let actionsHtml = '';
                    if (item.hasActions) {
                        actionsHtml = `
                            <div class="notif-actions">
                                <button class="notif-btn primary" onclick="window.location.href='directory.html'">Take a tour</button>
                                <button class="notif-btn secondary" onclick="this.parentElement.style.display='none'">No, thanks!</button>
                            </div>
                        `;
                    }

                    html += `
                        <div class="notif-card" ${borderStyle}>
                            <div class="notif-icon-wrap" style="background: ${item.iconBg}; color: ${item.iconColor};">
                                <i class="fa-solid ${item.icon}"></i>
                            </div>
                            <div class="notif-content">
                                <h4 class="notif-title">${item.title}</h4>
                                <p class="notif-subtitle">${item.subtitle}</p>
                                ${actionsHtml}
                            </div>
                            <div class="notif-right">
                                <span class="notif-time">${item.time}</span>
                                ${badgeHtml}
                            </div>
                        </div>
                    `;
                });

                html += `</div>`; // Close section
            });

            container.innerHTML = html;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderNotifications();
        });
    </script>
</body>
</html>
