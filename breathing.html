<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathing Exercise - Getmeds Meditation App</title>
    <link rel="stylesheet" href="style.css?v=31">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .breathe-container {
            height: 100%;
            width: 100%;
            background: #020617;
            /* Darker, more premium background */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            color: white;
            padding: 60px 24px 40px;
        }

        /* Ambient floating orbs - more subtle and deep */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            z-index: 0;
            animation: float 15s infinite alternate ease-in-out;
        }

        .orb-1 {
            top: -5%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: #1D9FDA;
        }

        .orb-2 {
            bottom: -10%;
            right: -5%;
            width: 450px;
            height: 450px;
            background: #6DB33F;
            animation-duration: 20s;
        }

        .orb-3 {
            top: 30%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: #1D9FDA;
            opacity: 0.15;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(40px, 60px) scale(1.1);
            }
        }

        /* Top Bar styling */
        .breathe-top-bar {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
        }

        .nav-back-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            color: white;
            transition: all 0.3s;
        }

        .nav-back-circle:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .exercise-meta {
            text-align: center;
        }

        .exercise-tag {
            font-size: 11px;
            font-weight: 850;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 4px;
            display: block;
        }

        .exercise-name {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            color: white;
        }

        /* Central Focus Area */
        .breathing-focus-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 10;
        }

        .instruction-display {
            height: 60px;
            /* Fixed height to prevent layout shift */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .instruction-text {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: white;
            opacity: 0.9;
        }

        /* High Fidelity Breathing Orb */
        .orb-system {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb-main {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 1) 0%, #6DB33F 50%, #1D9FDA 100%);
            box-shadow:
                0 0 60px rgba(29, 159, 218, 0.4),
                inset 0 0 30px rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
            /* No transition here, it's set dynamically by JS */
        }

        .orb-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(29, 159, 218, 0.2);
            filter: blur(20px);
            z-index: 1;
        }

        .orb-ring {
            position: absolute;
            width: 120%;
            height: 120%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 2;
        }

        .timer-val {
            font-size: 48px;
            font-weight: 300;
            color: white;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .timer-val.visible {
            opacity: 1;
        }

        /* Bottom Controls */
        .breathe-footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 20;
        }

        .start-btn {
            background: white;
            color: #1E1B4B;
            border: none;
            padding: 20px;
            border-radius: 24px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .start-btn:active {
            transform: scale(0.96);
        }

        .start-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .session-info {
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }
    </style>
</head>

<body data-page="subpage">
    <div class="device-frame">
        <div class="device-bezel">
            <div class="dynamic-island"></div>
            <div class="device-screen">

                <div class="breathe-container">
                    <!-- Background Elements -->
                    <div class="ambient-orb orb-1"></div>
                    <div class="ambient-orb orb-2"></div>
                    <div class="ambient-orb orb-3"></div>

                    <!-- Top Bar -->
                    <div class="breathe-top-bar">
                        <div class="nav-back-circle" onclick="history.back()">
                            <i class="fas fa-arrow-left"></i>
                        </div>
                        <div class="exercise-meta">
                            <span class="exercise-tag">Breathing Activity</span>
                            <h2 class="exercise-name" id="exeName">Box Breathing</h2>
                        </div>
                        <div style="width: 44px;"></div> <!-- Spacer for alignment -->
                    </div>

                    <!-- Center Interaction Area -->
                    <div class="breathing-focus-area">
                        <div class="instruction-display">
                            <div class="instruction-text" id="statusText">Focus your mind</div>
                        </div>

                        <div class="orb-system">
                            <div class="orb-ring" id="orbRing"></div>
                            <div class="orb-glow" id="orbGlow"></div>
                            <div class="orb-main" id="orb">
                                <span class="timer-val" id="countdown"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Footer Controls -->
                    <div class="breathe-footer">
                        <p class="session-info">Take a moment to center yourself before starting.</p>
                        <button class="start-btn" id="masterBtn" onclick="toggleSession()">
                            <i class="fas fa-play"></i>
                            <span>Start Session</span>
                        </button>
                    </div>
                </div>

                <div class="home-indicator" style="background: white;"></div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || 'Box Breathing';
        document.getElementById('exeName').textContent = title;

        const profiles = {
            'Box Breathing': [
                { text: 'Inhale', time: 4, scale: 2.4 },
                { text: 'Hold', time: 4, scale: 2.4 },
                { text: 'Exhale', time: 4, scale: 1 },
                { text: 'Hold', time: 4, scale: 1 }
            ],
            '4-7-8 Technique': [
                { text: 'Inhale', time: 4, scale: 2.4 },
                { text: 'Hold', time: 7, scale: 2.4 },
                { text: 'Exhale', time: 8, scale: 1 }
            ],
            'Equal Breath': [
                { text: 'Inhale', time: 5, scale: 2.4 },
                { text: 'Exhale', time: 5, scale: 1 }
            ],
            'Vagus Nerve Stim': [
                { text: 'Inhale', time: 4, scale: 2.4 },
                { text: 'Exhale', time: 6, scale: 1 }
            ]
        };

        const activeProfile = profiles[title] || profiles['Box Breathing'];

        let active = false;
        let phase = 0;
        let timer = null;
        let remaining = 0;

        const orb = document.getElementById('orb');
        const statusText = document.getElementById('statusText');
        const countdown = document.getElementById('countdown');
        const masterBtn = document.getElementById('masterBtn');

        function toggleSession() {
            if (active) {
                stop();
            } else {
                start();
            }
        }

        function start() {
            active = true;
            masterBtn.classList.add('active');
            masterBtn.querySelector('span').textContent = 'End Session';
            masterBtn.querySelector('i').className = 'fas fa-stop';
            countdown.classList.add('visible');
            phase = 0;
            nextPhase();
        }

        function stop() {
            active = false;
            clearTimeout(timer);
            masterBtn.classList.remove('active');
            masterBtn.querySelector('span').textContent = 'Start Session';
            masterBtn.querySelector('i').className = 'fas fa-play';
            statusText.textContent = 'Peaceful Mind';
            countdown.classList.remove('visible');
            orb.style.transition = 'transform 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
            orb.style.transform = 'scale(1)';
        }

        function nextPhase() {
            if (!active) return;

            const p = activeProfile[phase];

            // Apply scale with exact duration
            orb.style.transition = `transform ${p.time}s linear`;
            orb.style.transform = `scale(${p.scale})`;

            // Fade text
            statusText.style.opacity = 0;
            setTimeout(() => {
                if (!active) return;
                statusText.textContent = p.text;
                statusText.style.opacity = 1;
            }, 400);

            remaining = p.time;
            tick();

            timer = setTimeout(() => {
                phase = (phase + 1) % activeProfile.length;
                nextPhase();
            }, p.time * 1000);
        }

        function tick() {
            if (!active) return;
            countdown.textContent = remaining;
            if (remaining > 0) {
                setTimeout(() => {
                    if (!active) return;
                    remaining--;
                    tick();
                }, 1000);
            }
        }
    </script>
</body>

</html>
